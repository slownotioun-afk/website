<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Hamit</title>
  <meta name="description" content="Get in touch with Hamit." />
  <link rel="canonical" href="https://hamit.org/contact" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg:        #fafaf8;
      --fg:        #1a1a1a;
      --muted:     #555;
      --link:      #0055cc;
      --link-vis:  #6b21a8;
      --accent:    #0055cc;
      --max-w:     680px;
      --font:      Georgia, 'Times New Roman', serif;
      --font-size: 1.1rem;
      --line-h:    1.7;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      padding: 2rem 1rem;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: var(--font-size);
      line-height: var(--line-h);
      max-width: var(--max-w);
      margin-left: auto;
      margin-right: auto;
    }
    h1, h2 { line-height: 1.3; margin-top: 2.5rem; margin-bottom: 0.5rem; }
    h1 { font-size: 1.9rem; }
    h2 { font-size: 1.4rem; }
    p { margin: 1rem 0; }
    a { color: var(--link); text-decoration: underline; text-underline-offset: 3px; }
    a:visited { color: var(--link-vis); }
    a:hover, a:focus { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }
    hr { border: none; border-top: 1px solid #ccc; margin: 2.5rem 0; }
    nav { font-size: 0.9rem; margin-bottom: 2rem; color: var(--muted); }
    nav a { color: var(--link); }
    .section-list { list-style: none; padding: 0; margin: 0.5rem 0 1.5rem; }
    .section-list li { padding: 0.4rem 0; }
    .section-list .meta { color: var(--muted); font-size: 0.9rem; }
    footer { margin-top: 4rem; font-size: 0.85rem; color: var(--muted); border-top: 1px solid #ccc; padding-top: 1.5rem; }
    footer a { color: var(--muted); }
    .skip-link { position: absolute; left: -9999px; top: 0; background: var(--fg); color: var(--bg); padding: 0.5rem 1rem; z-index: 100; }
    .skip-link:focus { left: 0; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <nav aria-label="Site navigation">
    <a href="/">home</a> |
    <a href="/projects">projects</a> |
    <a href="/writing">writing</a> |
    <a href="/about">about</a> |
    <a href="/contact">contact</a>
  </nav>

  <main id="main">
    <h1>Contact</h1>
    <p>The best ways to reach me:</p>

    <ul class="section-list">
      <li>
        Email — <a href="mailto:you@hamit.org">you@hamit.org</a>
      </li>
      <li>
        LinkedIn — <a href="https://linkedin.com/in/REPLACE-ME" target="_blank" rel="noopener">linkedin.com/in/REPLACE-ME</a>
      </li>
      <li>
        GitHub — <a href="https://github.com/REPLACE-ME" target="_blank" rel="noopener">github.com/REPLACE-ME</a>
      </li>
      <li>
        Phone — <a href="tel:+44XXXXXXXXXX">+44 XXXX XXXXXX</a>
      </li>
    </ul>
  </main>

  <footer>
    <p>
      © 2026 Hamit &mdash;
      <a href="/">home</a> |
      <a href="/about">about</a> |
      <a href="/contact">contact</a>
    </p>
  </footer>
</body>
</html>
